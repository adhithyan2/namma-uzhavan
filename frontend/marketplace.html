<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Crop Strategy Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header text-center py-3">
                <i class="fas fa-leaf fa-2x text-success"></i>
                <h6 class="mt-2 fw-bold">Crop Engine</h6>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="marketplace.html">
                        <i class="fas fa-shopping-cart"></i> Marketplace
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="waste.html">
                        <i class="fas fa-recycle"></i> Waste to Value
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="help.html">
                        <i class="fas fa-question-circle"></i> Help & Support
                    </a>
                </li>
                <li class="nav-item mt-auto">
                    <a class="nav-link text-danger" href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header d-flex justify-content-between align-items-center px-4 py-3">
                <div>
                    <div id="guestBanner" class="guest-banner d-none">
                        <i class="fas fa-user-clock"></i>
                        <div class="guest-text">
                            <strong>Guest Mode</strong>
                            <small>Limited features - Login for full access</small>
                        </div>
                        <button class="btn btn-sm btn-warning" onclick="upgradeToFull()">
                            <i class="fas fa-arrow-up"></i> Upgrade
                        </button>
                    </div>
                    <h4 class="fw-bold mb-0">Agricultural Marketplace</h4>
                    <small class="text-muted">Buy seeds, fertilizers, pesticides & equipment</small>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <select class="form-select form-select-sm" style="width:auto;" id="cropLanguage" onchange="changeCropLanguage()">
                        <option value="en">English</option>
                        <option value="ta">Tamil</option>
                        <option value="hi">Hindi</option>
                        <option value="te">Telugu</option>
                    </select>
                    <button class="btn btn-outline-success position-relative" onclick="showCompareModal()">
                        <i class="fas fa-balance-scale"></i> Compare
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="compareCount">0</span>
                    </button>
                </div>
            </header>

            <div class="content p-4">
                <!-- Search Bar -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="search-box">
                            <input type="text" id="productSearch" class="form-control" placeholder="Search products..." onkeyup="searchProducts()">
                            <button class="btn btn-success btn-sm" onclick="searchProducts()">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Category Filters -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="category-filters">
                            <button class="btn btn-success active" onclick="filterProducts('All')">All</button>
                            <button class="btn btn-outline-success" onclick="filterProducts('Seeds')">Seeds</button>
                            <button class="btn btn-outline-success" onclick="filterProducts('Fertilizers')">Fertilizers</button>
                            <button class="btn btn-outline-success" onclick="filterProducts('Pesticides')">Pesticides</button>
                            <button class="btn btn-outline-success" onclick="filterProducts('Irrigation Equipment')">Irrigation Equipment</button>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="row" id="productsGrid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-success"></div>
                        <p class="mt-2">Loading products...</p>
                    </div>
                </div>

                <!-- Comparison Modal -->
                <div class="modal fade" id="compareModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header bg-success text-white">
                                <h5 class="modal-title">Product Comparison</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered" id="compareTable">
                                        <thead class="table-success">
                                            <tr>
                                                <th>Feature</th>
                                                <!-- Dynamic columns -->
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <!-- Dynamic rows -->
                                        </tbody>
                                    </table>
                                </div>
                                <div class="suggestion-box mt-3" id="bestSuggestion"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
