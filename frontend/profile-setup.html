<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile Setup - Climate Crop Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-setup-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-success text-white text-center py-4 position-relative">
                            <button class="btn btn-warning btn-sm edit-profile-btn" id="editModeBtn" onclick="toggleEditMode()" style="display:none;">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <i class="fas fa-user-circle fa-3x mb-3"></i>
                            <h2 class="fw-bold" id="profileTitle">Farmer Profile Setup</h2>
                            <p class="mb-0" id="profileSubtitle">Complete your profile to get personalized crop suggestions</p>
                        </div>
                        <div class="card-body p-4">
                            <form id="profileForm" onsubmit="handleProfileSubmit(event)">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Farmer Name *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                                            <input type="text" class="form-control" id="farmerName" required placeholder="Enter your name">
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Phone Number *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                            <input type="tel" class="form-control" id="phoneNumber" required placeholder="Enter phone number" pattern="[0-9]{10}">
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Land Area (Acres) *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-ruler-combined"></i></span>
                                            <input type="number" class="form-control" id="landArea" required placeholder="Enter land area" min="0" step="0.1">
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Soil Type *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-layer-group"></i></span>
                                            <select class="form-select" id="soilType" required>
                                                <option value="">Select soil type</option>
                                                <option value="Loamy">Loamy</option>
                                                <option value="Sandy">Sandy</option>
                                                <option value="Clay">Clay</option>
                                                <option value="Silty">Silty</option>
                                                <option value="Peaty">Peaty</option>
                                                <option value="Chalky">Chalky</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Farming Type *</label>
                                    <p class="text-muted small">Select multiple crops you grow</p>
                                    <div class="farming-type-container">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="paddy" value="Paddy">
                                            <label class="form-check-label" for="paddy">Paddy</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="wheat" value="Wheat">
                                            <label class="form-check-label" for="wheat">Wheat</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="millets" value="Millets">
                                            <label class="form-check-label" for="millets">Millets</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="vegetables" value="Vegetables">
                                            <label class="form-check-label" for="vegetables">Vegetables</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="cotton" value="Cotton">
                                            <label class="form-check-label" for="cotton">Cotton</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input farming-checkbox" type="checkbox" id="sugarcane" value="Sugarcane">
                                            <label class="form-check-label" for="sugarcane">Sugarcane</label>
                                        </div>
                                    </div>
                                    <div class="invalid-feedback" id="farmingTypeError">Please select at least one farming type</div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Irrigation Type *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-tint"></i></span>
                                            <select class="form-select" id="irrigationType" required>
                                                <option value="">Select irrigation type</option>
                                                <option value="Rain-fed">Rain-fed</option>
                                                <option value="Canal">Canal</option>
                                                <option value="Drip">Drip Irrigation</option>
                                                <option value="Sprinkler">Sprinkler</option>
                                                <option value="Tubewell">Tubewell</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Experience (Years) *</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                            <input type="number" class="form-control" id="experience" required placeholder="Years of experience" min="0" max="50">
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Location (for weather updates)</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                                        <input type="text" class="form-control" id="location" placeholder="Enter your city" value="Delhi">
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-success btn-lg fw-bold" id="profileSubmitBtn">
                                        <span class="spinner-border spinner-border-sm d-none" id="profileSpinner"></span>
                                        <span id="profileBtnText">Complete Profile</span>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary btn-lg" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">
                                        Cancel
                                    </button>
                                </div>
                            </form>
                            <div id="profileMessage" class="alert mt-3 d-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
