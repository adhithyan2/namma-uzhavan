<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Land Record - Namma Uzhavan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section-title { color: #1B5E20; border-bottom: 2px solid #1B5E20; padding-bottom: 10px; margin-bottom: 20px; }
        .form-label { font-weight: 600; color: #333; }
        .required::after { content: ' *'; color: red; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a href="agent-dashboard-new.html" class="btn btn-light">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
            <span class="navbar-brand mb-0 h1">Add New Land Record</span>
        </div>
    </nav>

    <div class="container py-4">
        <form id="landForm" class="form-card p-4">
            <!-- Owner Details -->
            <h5 class="section-title"><i class="fas fa-user me-2"></i>Owner Details</h5>
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Owner Name</label>
                    <input type="text" class="form-control" id="ownerName" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Aadhaar Number</label>
                    <input type="text" class="form-control" id="aadhaarNumber" maxlength="12" placeholder="12-digit Aadhaar">
                </div>
            </div>

            <!-- Land Details -->
            <h5 class="section-title"><i class="fas fa-map me-2"></i>Land Details</h5>
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Patta Number</label>
                    <input type="text" class="form-control" id="pattaNumber" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Survey Number</label>
                    <input type="text" class="form-control" id="surveyNumber" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Land Type</label>
                    <select class="form-select" id="landType" required>
                        <option value="">Select Type</option>
                        <option value="Wet">Wet Land</option>
                        <option value="Dry">Dry Land</option>
                        <option value="Garden">Garden Land</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Village</label>
                    <input type="text" class="form-control" id="village">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Taluk</label>
                    <input type="text" class="form-control" id="taluk">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">District</label>
                    <input type="text" class="form-control" id="district">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Land Size (Acres)</label>
                    <input type="number" step="0.01" class="form-control" id="landSize" placeholder="e.g., 2.50">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Current Crop</label>
                    <input type="text" class="form-control" id="currentCrop">
                </div>
            </div>

            <!-- Value Details -->
            <h5 class="section-title"><i class="fas fa-rupee-sign me-2"></i>Value Details</h5>
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Guideline Value (₹)</label>
                    <input type="number" class="form-control" id="guidelineValue" placeholder="e.g., 2500000">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Last Sale Price (₹)</label>
                    <input type="number" class="form-control" id="lastSalePrice" placeholder="e.g., 1800000">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Last Sale Date</label>
                    <input type="date" class="form-control" id="lastSaleDate">
                </div>
            </div>

            <!-- Submit -->
            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-save me-2"></i>Save Land Record
                </button>
                <button type="reset" class="btn btn-secondary btn-lg ms-2">
                    <i class="fas fa-redo me-2"></i>Reset
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('landForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                ownerName: document.getElementById('ownerName').value,
                aadhaarNumber: document.getElementById('aadhaarNumber').value,
                pattaNumber: document.getElementById('pattaNumber').value,
                surveyNumber: document.getElementById('surveyNumber').value,
                village: document.getElementById('village').value,
                taluk: document.getElementById('taluk').value,
                district: document.getElementById('district').value,
                landSize: document.getElementById('landSize').value,
                landType: document.getElementById('landType').value,
                currentCrop: document.getElementById('currentCrop').value,
                guidelineValue: parseInt(document.getElementById('guidelineValue').value) || 0,
                lastSalePrice: parseInt(document.getElementById('lastSalePrice').value) || 0,
                lastSaleDate: document.getElementById('lastSaleDate').value || null
            };

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';

            try {
                const res = await fetch('/api/land-records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    alert('Land record saved successfully!');
                    window.location.href = 'land-search.html';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error saving: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Land Record';
            }
        });
    </script>
</body>
</html>
