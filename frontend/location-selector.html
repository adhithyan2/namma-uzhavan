<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Location Selection - Smart Farmers Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #1B5E20; --secondary-green: #2E7D32; --light-green: #4CAF50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8f9fa; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, var(--primary-green), var(--light-green)); color: white; padding: 20px; }
        .header h3 { margin: 0; }
        
        .location-container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        .card { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card-header { background: white; border-bottom: 2px solid var(--light-green); padding: 15px 20px; border-radius: 15px 15px 0 0 !important; }
        .card-header h5 { margin: 0; color: var(--primary-green); }
        
        .form-label { font-weight: 500; color: #333; margin-bottom: 5px; }
        .form-control:focus { border-color: var(--light-green); box-shadow: 0 0 0 0.2rem rgba(76, 175, 80, 0.25); }
        
        .btn-success { background: var(--primary-green); border: none; }
        .btn-success:hover { background: var(--secondary-green); }
        
        .btn-lg { padding: 12px 24px; font-size: 16px; }
        
        .coords-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        #map { height: 500px; border-radius: 0 0 15px 15px; z-index: 1; }
        
        .coordinates-display { 
            background: #e8f5e9; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 15px;
        }
        
        .coord-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #c8e6c9;
        }
        .coord-item:last-child { border-bottom: none; }
        .coord-label { color: #666; }
        .coord-value { font-weight: 600; color: var(--primary-green); }
        
        .address-result {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #ff9800;
        }
        
        .dms-inputs { display: flex; gap: 5px; align-items: center; }
        .dms-inputs input { width: 60px; text-align: center; }
        
        .loading { opacity: 0.7; pointer-events: none; }
        
        @media (max-width: 768px) {
            .coords-grid { grid-template-columns: 1fr; }
            #map { height: 350px; }
            .btn-lg { padding: 10px 18px; font-size: 14px; }
        }
        
        .leaflet-popup-content-wrapper { border-radius: 10px; }
        .popup-info { min-width: 150px; }
        .popup-info h6 { margin: 0 0 5px; color: var(--primary-green); }
        .popup-info p { margin: 2px 0; font-size: 12px; color: #666; }
        
        .gps-btn { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h3><i class="fas fa-map-marker-alt me-2"></i>GPS Farm Location</h3>
                <small>Select your farm location on the map</small>
            </div>
            <button class="btn btn-light" onclick="window.location.href='farmer-dashboard-new.html'">
                <i class="fas fa-arrow-left me-2"></i>Back
            </button>
        </div>
    </div>

    <div class="location-container">
        <div class="row">
            <!-- Left Side - Form -->
            <div class="col-lg-5">
                <!-- Address Search -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-search me-2"></i>Search Address</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Enter Address / Village / City</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="addressInput" placeholder="e.g., Coimbatore, Tamil Nadu">
                                <button class="btn btn-success" onclick="searchAddress()">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>
                        
                        <button class="btn btn-success btn-lg w-100 gps-btn" onclick="getCurrentLocation()">
                            <i class="fas fa-crosshairs me-2"></i>Use Current Location (GPS)
                        </button>
                        
                        <div id="gpsStatus" class="mt-2 text-center text-muted" style="display:none;">
                            <i class="fas fa-spinner fa-spin"></i> Getting GPS coordinates...
                        </div>
                    </div>
                </div>

                <!-- Decimal Degrees -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-map-pin me-2"></i>Decimal Coordinates</h5>
                    </div>
                    <div class="card-body">
                        <div class="coords-grid">
                            <div class="mb-3">
                                <label class="form-label">Latitude</label>
                                <input type="number" step="0.000001" class="form-control" id="latInput" placeholder="e.g., 11.031812" onchange="updateMapFromInputs()">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Longitude</label>
                                <input type="number" step="0.000001" class="form-control" id="lonInput" placeholder="e.g., 77.026581" onchange="updateMapFromInputs()">
                            </div>
                        </div>
                        
                        <button class="btn btn-outline-success w-100 mb-3" onclick="getAddressFromCoords()">
                            <i class="fas fa-home me-2"></i>Get Address from Coordinates
                        </button>
                        
                        <div class="coordinates-display">
                            <div class="coord-item">
                                <span class="coord-label">Lat, Long Combined:</span>
                                <span class="coord-value" id="combinedCoords">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DMS Conversion -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-calculator me-2"></i>DMS (Degrees, Minutes, Seconds)</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Latitude (DMS)</label>
                            <div class="dms-inputs">
                                <input type="number" class="form-control" id="latDeg" placeholder="°">
                                <input type="number" class="form-control" id="latMin" placeholder="'">
                                <input type="number" class="form-control" id="latSec" placeholder="" step="0.01">
                                <select class="form-select" id="latDir" style="width:70px;">
                                    <option value="N">N</option>
                                    <option value="S">S</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Longitude (DMS)</label>
                            <div class="dms-inputs">
                                <input type="number" class="form-control" id="lonDeg" placeholder="°">
                                <input type="number" class="form-control" id="lonMin" placeholder="'">
                                <input type="number" class="form-control" id="lonSec" placeholder="" step="0.01">
                                <select class="form-select" id="lonDir" style="width:70px;">
                                    <option value="E">E</option>
                                    <option value="W">W</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn btn-outline-success w-100" onclick="convertDMSToDD()">
                            <i class="fas fa-sync-alt me-2"></i>Convert DMS to Decimal
                        </button>
                    </div>
                </div>

                <!-- Address Result -->
                <div class="card" id="addressCard" style="display:none;">
                    <div class="card-header">
                        <h5><i class="fas fa-address-card me-2"></i>Detected Address</h5>
                    </div>
                    <div class="card-body">
                        <div class="address-result" id="addressResult"></div>
                    </div>
                </div>

                <!-- Save Location -->
                <div class="card">
                    <div class="card-body">
                        <button class="btn btn-success btn-lg w-100" onclick="saveFarmLocation()">
                            <i class="fas fa-save me-2"></i>Save Farm Location
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side - Map -->
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-map me-2"></i>Interactive Map</h5>
                        <small class="text-muted">Click on map to select location</small>
                    </div>
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        const defaultLat = 11.0318;
        const defaultLon = 77.0266;

        // Initialize map
        function initMap() {
            map = L.map('map').setView([defaultLat, defaultLon], 12);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add marker
            marker = L.marker([defaultLat, defaultLon], { draggable: true }).addTo(map);
            marker.bindPopup(createPopupContent(defaultLat, defaultLon));

            // Marker drag event
            marker.on('dragend', function(e) {
                const pos = e.target.getLatLng();
                updateFieldsFromMap(pos.lat, pos.lng);
            });

            // Map click event
            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                updateFieldsFromMap(e.latlng.lat, e.latlng.lng);
            });
        }

        function createPopupContent(lat, lon) {
            return `
                <div class="popup-info">
                    <h6>Farm Location</h6>
                    <p><strong>Lat:</strong> ${lat.toFixed(6)}</p>
                    <p><strong>Lon:</strong> ${lon.toFixed(6)}</p>
                </div>
            `;
        }

        function updateFieldsFromMap(lat, lon) {
            document.getElementById('latInput').value = lat.toFixed(6);
            document.getElementById('lonInput').value = lon.toFixed(6);
            document.getElementById('combinedCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            
            marker.setPopupContent(createPopupContent(lat, lon));
            convertToDMS(lat, lon);
            getAddressFromCoords();
        }

        function updateMapFromInputs() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            
            if (lat && lon && !isNaN(lat) && !isNaN(lon)) {
                map.setView([lat, lon], 14);
                marker.setLatLng([lat, lon]);
                document.getElementById('combinedCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                convertToDMS(lat, lon);
            }
        }

        // Get current GPS location
        function getCurrentLocation() {
            const status = document.getElementById('gpsStatus');
            status.style.display = 'block';
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Getting GPS coordinates...';
            
            if (!navigator.geolocation) {
                alert('GPS not supported in this browser');
                status.style.display = 'none';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    document.getElementById('latInput').value = lat.toFixed(6);
                    document.getElementById('lonInput').value = lon.toFixed(6);
                    
                    map.setView([lat, lon], 15);
                    marker.setLatLng([lat, lon]);
                    
                    document.getElementById('combinedCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    convertToDMS(lat, lon);
                    getAddressFromCoords();
                    
                    status.innerHTML = '<i class="fas fa-check-circle text-success"></i> GPS location detected!';
                    setTimeout(() => { status.style.display = 'none'; }, 2000);
                },
                function(error) {
                    status.innerHTML = '<i class="fas fa-exclamation-circle text-danger"></i> ' + error.message;
                    setTimeout(() => { status.style.display = 'none'; }, 3000);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // Search address using Nominatim
        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=in&limit=1`);
                const data = await response.json();

                if (data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    document.getElementById('latInput').value = lat.toFixed(6);
                    document.getElementById('lonInput').value = lon.toFixed(6);
                    
                    map.setView([lat, lon], 14);
                    marker.setLatLng([lat, lon]);
                    document.getElementById('combinedCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    
                    convertToDMS(lat, lon);
                    showAddress(data[0].display_name, data[0]);
                } else {
                    alert('Address not found');
                }
            } catch (error) {
                alert('Error searching address');
            }
        }

        // Reverse geocoding
        async function getAddressFromCoords() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            
            if (!lat || !lon) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
                const data = await response.json();
                
                if (data.address) {
                    const addr = data.address;
                    const village = addr.village || addr.town || addr.city || addr.county || 'Unknown';
                    const district = addr.county || addr.state_district || 'Unknown';
                    const state = addr.state || 'Unknown';
                    const country = addr.country || 'India';
                    
                    showAddress(`${village}, ${district}, ${state}`, { village, district, state, country, lat, lon });
                }
            } catch (error) {
                console.log('Reverse geocoding failed');
            }
        }

        function showAddress(text, details) {
            const card = document.getElementById('addressCard');
            const result = document.getElementById('addressResult');
            
            card.style.display = 'block';
            result.innerHTML = `
                <h6><i class="fas fa-map-marker-alt me-2"></i>${details.village || 'Location'}</h6>
                <p class="mb-1"><strong>Village:</strong> ${details.village || '-'}</p>
                <p class="mb-1"><strong>District:</strong> ${details.district || '-'}</p>
                <p class="mb-1"><strong>State:</strong> ${details.state || '-'}</p>
                <p class="mb-0"><strong>Country:</strong> ${details.country || 'India'}</p>
            `;
            
            // Store for saving
            window.detectedLocation = details;
        }

        // DMS Conversion
        function convertToDMS(lat, lon) {
            // Latitude
            const latDir = lat >= 0 ? 'N' : 'S';
            const latAbs = Math.abs(lat);
            const latDeg = Math.floor(latAbs);
            const latMin = Math.floor((latAbs - latDeg) * 60);
            const latSec = ((latAbs - latDeg) * 60 - latMin) * 60;
            
            document.getElementById('latDeg').value = latDeg;
            document.getElementById('latMin').value = latMin;
            document.getElementById('latSec').value = latSec.toFixed(2);
            document.getElementById('latDir').value = latDir;

            // Longitude
            const lonDir = lon >= 0 ? 'E' : 'W';
            const lonAbs = Math.abs(lon);
            const lonDeg = Math.floor(lonAbs);
            const lonMin = Math.floor((lonAbs - lonDeg) * 60);
            const lonSec = ((lonAbs - lonDeg) * 60 - lonMin) * 60;
            
            document.getElementById('lonDeg').value = lonDeg;
            document.getElementById('lonMin').value = lonMin;
            document.getElementById('lonSec').value = lonSec.toFixed(2);
            document.getElementById('lonDir').value = lonDir;
        }

        function convertDMSToDD() {
            const latDeg = parseFloat(document.getElementById('latDeg').value) || 0;
            const latMin = parseFloat(document.getElementById('latMin').value) || 0;
            const latSec = parseFloat(document.getElementById('latSec').value) || 0;
            const latDir = document.getElementById('latDir').value;
            
            let lat = latDeg + latMin/60 + latSec/3600;
            if (latDir === 'S') lat = -lat;

            const lonDeg = parseFloat(document.getElementById('lonDeg').value) || 0;
            const lonMin = parseFloat(document.getElementById('lonMin').value) || 0;
            const lonSec = parseFloat(document.getElementById('lonSec').value) || 0;
            const lonDir = document.getElementById('lonDir').value;
            
            let lon = lonDeg + lonMin/60 + lonSec/3600;
            if (lonDir === 'W') lon = -lon;

            document.getElementById('latInput').value = lat.toFixed(6);
            document.getElementById('lonInput').value = lon.toFixed(6);
            
            map.setView([lat, lon], 14);
            marker.setLatLng([lat, lon]);
            document.getElementById('combinedCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        // Save farm location
        function saveFarmLocation() {
            const lat = document.getElementById('latInput').value;
            const lon = document.getElementById('lonInput').value;
            const loc = window.detectedLocation;
            
            if (!lat || !lon) {
                alert('Please select a location first');
                return;
            }

            const locationData = {
                latitude: lat,
                longitude: lon,
                village: loc?.village || 'Unknown',
                district: loc?.district || 'Unknown',
                state: loc?.state || 'Unknown',
                country: loc?.country || 'India',
                fullAddress: loc ? `${loc.village || ''}, ${loc.district || ''}, ${loc.state || ''}` : 'Custom Location',
                savedAt: new Date().toISOString()
            };

            // Save to localStorage
            localStorage.setItem('farmLocation', JSON.stringify(locationData));
            
            alert('Farm location saved successfully!');
            
            // Redirect back to dashboard
            window.location.href = 'farmer-dashboard-new.html';
        }

        // Initialize on load
        window.onload = initMap;
    </script>
</body>
</html>
