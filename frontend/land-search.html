<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Records - Namma Uzhavan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1B5E20, #4CAF50); min-height: 100vh; }
        .search-card { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .result-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .result-card:hover { transform: translateY(-5px); }
        .land-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #1B5E20, #4CAF50); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .search-btn { background: linear-gradient(135deg, #1B5E20, #4CAF50); border: none; }
        .search-btn:hover { background: linear-gradient(135deg, #1B5E20, #388E3C); }
        .nav-back { position: fixed; top: 20px; left: 20px; z-index: 1000; }
    </style>
</head>
<body>
    <a href="agent-dashboard-new.html" class="btn btn-light nav-back">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-card p-5">
                    <div class="text-center mb-4">
                        <div class="land-icon mx-auto mb-3">
                            <i class="fas fa-map-marked-alt"></i>
                        </div>
                        <h2 class="fw-bold text-success">Land Record Search</h2>
                        <p class="text-muted">Search by Survey Number, Patta Number, or Owner Name</p>
                    </div>

                    <div class="mb-4">
                        <div class="input-group">
                            <span class="input-group-text bg-success text-white"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control form-control-lg" id="searchInput" placeholder="Enter Survey Number / Patta Number / Owner Name...">
                            <button class="btn btn-success btn-lg" onclick="searchLand()">Search</button>
                        </div>
                    </div>

                    <div id="results" class="row"></div>

                    <div id="loading" class="text-center py-5" style="display:none;">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-3 text-muted">Searching land records...</p>
                    </div>

                    <div id="noResults" class="text-center py-5" style="display:none;">
                        <i class="fas fa-search text-muted" style="font-size: 48px;"></i>
                        <p class="mt-3 text-muted">Enter a search term to find land records</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function searchLand() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Please enter a search term');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            document.getElementById('noResults').style.display = 'none';

            try {
                const res = await fetch(`/api/land-records/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (data.length === 0) {
                    document.getElementById('noResults').style.display = 'block';
                    document.getElementById('noResults').innerHTML = '<i class="fas fa-folder-open text-muted" style="font-size:48px"></i><p class="mt-3 text-muted">No records found</p>';
                    return;
                }

                const resultsHtml = data.map(record => `
                    <div class="col-md-6 mb-3">
                        <div class="card result-card p-3">
                            <div class="d-flex align-items-center mb-3">
                                <div class="land-icon me-3" style="width:50px;height:50px;font-size:20px;">
                                    <i class="fas fa-home"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold">${record.ownerName}</h6>
                                    <small class="text-muted">${record.village}, ${record.district}</small>
                                </div>
                            </div>
                            <div class="row text-center">
                                <div class="col-6">
                                    <small class="text-muted">Patta</small>
                                    <p class="mb-0 fw-bold">${record.pattaNumber}</p>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Survey</small>
                                    <p class="mb-0 fw-bold">${record.surveyNumber}</p>
                                </div>
                            </div>
                            <div class="mt-2 text-center">
                                <span class="badge bg-success">${record.landType}</span>
                                <span class="badge bg-info">${record.landSize} acres</span>
                            </div>
                            <a href="land-details.html?id=${record._id}" class="btn btn-success w-100 mt-3">
                                <i class="fas fa-eye me-2"></i>View Details
                            </a>
                        </div>
                    </div>
                `).join('');

                document.getElementById('results').innerHTML = resultsHtml;

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('Error searching: ' + error.message);
            }
        }

        // Enter key search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchLand();
        });
    </script>
</body>
</html>
