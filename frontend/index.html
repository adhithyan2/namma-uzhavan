<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Risk Adaptive Crop Strategy Engine - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <!-- Left Side - Branding -->
            <div class="col-lg-6 left-section d-none d-lg-flex flex-column justify-content-center align-items-center text-white">
                <div class="text-center p-5">
                    <i class="fas fa-leaf logo-icon mb-4"></i>
                    <h1 class="display-4 fw-bold mb-3">Climate Risk Adaptive</h1>
                    <h2 class="h3 mb-4">Crop Strategy Engine</h2>
                    <p class="lead px-5">Smart farming solutions powered by climate data, AI predictions, and sustainable practices.</p>
                    <div class="mt-5 feature-icons">
                        <div class="feature-item">
                            <i class="fas fa-cloud-sun"></i>
                            <span>Weather Intelligence</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-seedling"></i>
                            <span>Crop Suggestions</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Smart Marketplace</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login/Signup Form -->
            <div class="col-lg-6 right-section d-flex flex-column justify-content-center align-items-center">
                <div class="form-container w-100 px-4" style="max-width: 450px;">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-success">Welcome Back</h3>
                        <p class="text-muted">Sign in to access your farm dashboard</p>
                    </div>

                    <!-- Toggle Buttons -->
                    <div class="toggle-buttons d-flex mb-4">
                        <button class="btn btn-success flex-fill active" id="loginBtn" onclick="showForm('login')">Login</button>
                        <button class="btn btn-outline-success flex-fill" id="signupBtn" onclick="showForm('signup')">Sign Up</button>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="loginEmail" required placeholder="Enter your email">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="loginPassword" required placeholder="Enter your password">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
                            <span id="loginBtnText">Login</span>
                        </button>
                    </form>

                    <!-- Signup Form -->
                    <form id="signupForm" class="d-none" onsubmit="handleSignup(event)">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="signupName" required placeholder="Enter your name">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="signupEmail" required placeholder="Enter your email">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="signupPassword" required placeholder="Create a password" minlength="6">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="signupConfirmPassword" required placeholder="Confirm your password">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            <span class="spinner-border spinner-border-sm d-none" id="signupSpinner"></span>
                            <span id="signupBtnText">Create Account</span>
                        </button>
                    </form>

                    <!-- Guest Mode Button -->
                    <div class="text-center mt-4">
                        <div class="divider"><span>or</span></div>
                        <button class="btn btn-outline-secondary w-100 py-2 fw-bold" onclick="enterGuestMode()">
                            <i class="fas fa-user-clock me-2"></i>Skip for Now - Guest Mode
                        </button>
                        <small class="text-muted d-block mt-2">Guest mode has limited features</small>
                    </div>

                    <div id="authMessage" class="alert mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
